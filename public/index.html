<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OVERMIND</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div class="title-wrap">
          <h1>OVERMIND</h1>
        </div>
        <div class="stats-wrap">
          <div class="stat">
            <span class="label">SUPPLY</span>
            <span id="active-count" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">MINERALS</span>
            <span id="token-total" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">LAST SYNC</span>
            <span id="last-update" class="value">-</span>
          </div>
          <label class="control">
            <span>HIVE</span>
            <select id="project-filter">
              <option value="all">All</option>
            </select>
          </label>
          <label class="control">
            <span>BROOD</span>
            <select id="session-filter">
              <option value="all">All</option>
            </select>
          </label>
          <button id="pokedex-toggle" class="pokedex-toggle" type="button">
            <span class="pokedex-toggle-title">ARCHIVE</span>
            <span id="pokedex-progress" class="pokedex-toggle-progress">0 / 49</span>
          </button>
          <button id="promo-studio-toggle" class="promo-studio-toggle" type="button" hidden>
            <span class="promo-studio-toggle-title">Promo Studio</span>
            <span class="promo-studio-toggle-subtitle">Custom scene builder</span>
          </button>
          <button id="hard-reset-btn" class="hard-reset-btn" type="button" hidden>PURGE</button>
        </div>
      </header>

      <main class="main-grid">
        <section class="canvas-wrap">
          <div class="canvas-area">
            <canvas id="office-canvas" aria-label="overmind tactical map"></canvas>
            <div id="agent-overlay" class="agent-overlay"></div>
            <aside id="promo-studio-panel" class="promo-studio-panel" hidden>
              <div class="promo-studio-panel-head">
                <div>
                  <h2 class="promo-studio-title">Promo Studio</h2>
                  <p id="promo-studio-summary" class="promo-studio-summary">Build a custom promo-ready scene in mock mode.</p>
                </div>
                <button id="promo-studio-close" class="promo-studio-close" type="button" aria-label="Close Promo Studio">Close</button>
              </div>
              <div class="promo-studio-toolbar">
                <label class="promo-studio-switch">
                  <input id="promo-studio-enabled" type="checkbox" />
                  <span>Use custom scene</span>
                </label>
                <div class="promo-studio-actions">
                  <button id="promo-add-root" class="promo-studio-btn" type="button">Add Root</button>
                  <button id="promo-reset" class="promo-studio-btn promo-studio-btn-muted" type="button">Reset</button>
                  <button id="promo-export" class="promo-studio-btn promo-studio-btn-accent" type="button">Download PNG</button>
                </div>
              </div>
              <div id="promo-studio-list" class="promo-studio-list"></div>
            </aside>
          </div>
        </section>

        <div class="bottom-hud">
          <div class="hud-left">
            <div id="hud-minimap" class="hud-minimap"></div>
          </div>
          <div class="hud-center">
            <div id="agent-list" class="agent-list"></div>
            <div id="hud-selected" class="hud-selected">
              <div class="hud-no-selection">NO UNIT SELECTED</div>
            </div>
            <div class="box-panel">
              <div class="box-panel-head">
                <h3 class="box-title">COCOON <span id="box-count">0</span></h3>
                <button id="box-history-toggle" class="box-history-toggle" type="button">VIEW ALL</button>
              </div>
              <div id="box-list" class="box-list"></div>
            </div>
          </div>
          <div class="hud-right">
            <div id="hud-stats" class="hud-stats"></div>
          </div>
        </div>
      </main>
    </div>

    <div id="pokedex-modal" class="pokedex-modal" hidden>
      <div id="pokedex-backdrop" class="pokedex-backdrop"></div>
      <section class="pokedex-panel" role="dialog" aria-modal="true" aria-labelledby="pokedex-title">
        <div class="pokedex-panel-head">
          <div>
            <h2 id="pokedex-title">UNIT ARCHIVE</h2>
            <p id="pokedex-summary" class="pokedex-summary">0 / 49 discovered</p>
          </div>
          <div class="pokedex-toolbar">
            <div class="pokedex-lang-tabs" role="tablist" aria-label="Archive language">
              <button id="pokedex-lang-en" class="pokedex-lang-tab active" type="button" role="tab" aria-selected="true">EN</button>
              <button id="pokedex-lang-ko" class="pokedex-lang-tab" type="button" role="tab" aria-selected="false">KO</button>
            </div>
          <button id="pokedex-close" class="pokedex-close" type="button" aria-label="Close Archive">CLOSE</button>
          </div>
        </div>
        <div id="pokedex-grid" class="pokedex-grid"></div>
      </section>
    </div>

    <div id="box-history-modal" class="pokedex-modal" hidden>
      <div id="box-history-backdrop" class="pokedex-backdrop"></div>
      <section class="pokedex-panel box-history-panel" role="dialog" aria-modal="true" aria-labelledby="box-history-title">
        <div class="pokedex-panel-head">
          <div>
            <h2 id="box-history-title">COCOON HISTORY</h2>
            <p id="box-history-summary" class="pokedex-summary">0 cocooned sessions</p>
          </div>
          <button id="box-history-close" class="pokedex-close" type="button" aria-label="Close Cocoon History">CLOSE</button>
        </div>
        <div id="box-history-grid" class="box-history-grid"></div>
      </section>
    </div>

    <div id="subhistory-modal" class="pokedex-modal" hidden>
      <div id="subhistory-backdrop" class="pokedex-backdrop"></div>
      <section class="pokedex-panel subhistory-panel" role="dialog" aria-modal="true" aria-labelledby="subhistory-title">
        <div class="pokedex-panel-head">
          <div>
            <h2 id="subhistory-title">BROODLING HISTORY</h2>
            <p id="subhistory-summary" class="pokedex-summary">0 records</p>
          </div>
          <button id="subhistory-close" class="pokedex-close" type="button" aria-label="Close Broodling History">CLOSE</button>
        </div>
        <div id="subhistory-grid" class="subhistory-modal-grid"></div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
